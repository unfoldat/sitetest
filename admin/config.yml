# ============================================================
# Sveltia CMS 설정 — 좋은비전 자립생활센터
# 직원이 코드를 몰라도 제목·사진·내용만 채우면 글이 올라갑니다.
# 저장 위치와 파일 이름은 이 설정이 자동으로 정합니다(직원은 신경 쓸 필요 없음).
# ============================================================

# 배포 후 GitHub 저장소에 맞게 아래 두 줄을 수정하세요.
backend:
  name: github
  repo: unfoldat/sitetest
  branch: main

# 업로드한 사진이 저장되는 폴더
media_folder: "images/uploads"
public_folder: "/images/uploads"

# 관리자 화면 언어
locale: "ko"

collections:
  # ---------- 공지사항 ----------
  - name: "notice"
    label: "공지사항"
    label_singular: "공지"
    folder: "센터소식/공지"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "제목", widget: "string" }
      - { name: "date",  label: "작성일", widget: "datetime", format: "YYYY-MM-DD" }
      - { name: "pinned", label: "상단 고정", widget: "boolean", default: false, required: false }
      - name: "photo"
        label: "대표 사진"
        widget: "image"
        required: false
      - name: "photo_alt"
        label: "사진 설명 (눈이 불편한 분을 위한 대체 텍스트)"
        hint: "사진에 무엇이 담겨 있는지 한 문장으로 적어 주세요. 예: 어르신 열 분이 강당에서 요가를 하는 모습"
        widget: "string"
        required: false
      - { name: "body", label: "내용", widget: "markdown" }

  # ---------- 활동소식 ----------
  - name: "activity"
    label: "활동소식"
    label_singular: "활동"
    folder: "센터소식/활동"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "제목", widget: "string" }
      - { name: "date",  label: "작성일", widget: "datetime", format: "YYYY-MM-DD" }
      - name: "photo"
        label: "대표 사진"
        widget: "image"
        required: false
      - name: "photo_alt"
        label: "사진 설명 (눈이 불편한 분을 위한 대체 텍스트)"
        hint: "사진에 무엇이 담겨 있는지 한 문장으로 적어 주세요."
        widget: "string"
        required: false
      - { name: "body", label: "내용", widget: "markdown" }
