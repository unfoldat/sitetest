# ============================================================
# Sveltia CMS 설정 — 좋은비전 자립생활센터
# 직원이 코드를 몰라도 제목·사진·내용만 채우면 글이 올라갑니다.
#
# 권한 모델 (1단계 — Flat RBAC):
#   Owner  = 이 레포의 GitHub 레포 관리자 (배포/설정 변경 가능)
#   Editor = 아래 collections를 통해 글쓰기/수정 가능한 GitHub collaborator
#   승인 워크플로(editorial_workflow)는 2단계에서 검토 후 도입 예정.
#   자세한 내용: HANDOFF.md 참고
# ============================================================

backend:
  name: github
  repo: unfoldat/sitetest
  branch: main

media_folder: "public/images/uploads"
public_folder: "/sitetest/images/uploads"

locale: "ko"

collections:
  - name: "notice"
    label: "센터소식"
    label_singular: "소식"
    folder: "src/content/notice"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "제목", widget: "string" }
      - { name: "date", label: "작성일", widget: "datetime", format: "YYYY-MM-DD" }
      - { name: "category", label: "분류", widget: "select", options: ["공지", "활동"], default: "공지" }
      - { name: "summary", label: "요약(한 줄)", widget: "string", required: false }
      - { name: "body", label: "내용", widget: "markdown" }

  - name: "gallery"
    label: "활동사진"
    label_singular: "사진"
    folder: "src/content/gallery"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "제목", widget: "string" }
      - { name: "date", label: "촬영일", widget: "datetime", format: "YYYY-MM-DD" }
      - { name: "image", label: "사진", widget: "image" }
      - name: "alt"
        label: "대체텍스트 (사진 설명 — 필수)"
        widget: "string"
        required: true
        hint: "화면낭독기가 이 사진 대신 읽어줄 설명입니다. '사진'이라고만 쓰지 말고, 무슨 장면인지 구체적으로 써주세요. 예: '동료상담가 양성과정 3기 수료식에서 참가자들이 수료증을 들고 있는 모습'"
        pattern: ['.{5,}', '5자 이상 입력해주세요.']
      - { name: "body", label: "설명(선택)", widget: "markdown", required: false }
